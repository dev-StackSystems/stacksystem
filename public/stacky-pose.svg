<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 110" fill="none">
  <!-- Sombra -->
  <ellipse cx="45" cy="107" rx="22" ry="4" fill="rgba(0,0,0,0.12)"/>

  <!-- Antena -->
  <rect x="43" y="2" width="4" height="16" rx="2" fill="#ea580c"/>
  <circle cx="45" cy="2" r="5" fill="#fb923c"/>
  <circle cx="45" cy="2" r="2.5" fill="#fed7aa"/>

  <!-- Parafusos laterais (orelhas) -->
  <rect x="4" y="30" width="10" height="18" rx="5" fill="#ea580c"/>
  <rect x="76" y="30" width="10" height="18" rx="5" fill="#ea580c"/>

  <!-- Cabeça -->
  <rect x="14" y="16" width="62" height="52" rx="18" fill="#f97316"/>
  <!-- Reflexo da cabeça -->
  <rect x="18" y="20" width="30" height="10" rx="5" fill="rgba(255,255,255,0.22)"/>

  <!-- Visor escuro -->
  <rect x="20" y="24" width="50" height="38" rx="12" fill="#0f172a"/>
  <!-- Scanlines -->
  <rect x="20" y="24" width="50" height="38" rx="12"
        fill="url(#scan)" opacity="0.06"/>
  <defs>
    <pattern id="scan" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="white"/>
    </pattern>
  </defs>

  <!-- Olhos (felizes — meia lua) -->
  <circle cx="36" cy="40" r="9" fill="white"/>
  <circle cx="54" cy="40" r="9" fill="white"/>
  <!-- Pupilas -->
  <circle cx="37" cy="41" r="5.5" fill="#0f172a"/>
  <circle cx="55" cy="41" r="5.5" fill="#0f172a"/>
  <!-- Brilho nos olhos -->
  <circle cx="39" cy="38.5" r="2" fill="white"/>
  <circle cx="57" cy="38.5" r="2" fill="white"/>

  <!-- Sorriso grande -->
  <path d="M33 54 Q45 63 57 54" stroke="rgba(255,255,255,0.75)" stroke-width="2.5"
        stroke-linecap="round" fill="none"/>

  <!-- Bochechas coradas -->
  <ellipse cx="26" cy="52" rx="5" ry="3.5" fill="rgba(254,215,170,0.55)"/>
  <ellipse cx="64" cy="52" rx="5" ry="3.5" fill="rgba(254,215,170,0.55)"/>

  <!-- Pescoço -->
  <rect x="37" y="68" width="16" height="8" rx="4" fill="#ea580c"/>

  <!-- Torso -->
  <rect x="20" y="76" width="50" height="28" rx="12" fill="#f97316"/>
  <!-- Painel do peito -->
  <rect x="30" y="82" width="30" height="16" rx="7" fill="rgba(0,0,0,0.15)"/>
  <!-- Luzes piscando no peito -->
  <circle cx="37" cy="90" r="3.5" fill="#fed7aa"/>
  <circle cx="45" cy="90" r="3.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="53" cy="90" r="3.5" fill="#fed7aa"/>

  <!-- BRAÇO ESQUERDO — levantado, acenando! -->
  <rect x="7" y="56" width="13" height="22" rx="6.5" fill="#f97316"
        transform="rotate(-50 13.5 67)"/>
  <!-- Mão esquerda -->
  <circle cx="5" cy="50" r="7" fill="#ea580c"/>
  <!-- Dedos acenando -->
  <rect x="1"  y="40" width="4" height="10" rx="2" fill="#f97316" transform="rotate(-15 3 45)"/>
  <rect x="5"  y="38" width="4" height="11" rx="2" fill="#f97316" transform="rotate(-5  7 43)"/>
  <rect x="9"  y="38" width="4" height="11" rx="2" fill="#f97316" transform="rotate(8  11 43)"/>

  <!-- BRAÇO DIREITO — para baixo, relaxado -->
  <rect x="70" y="78" width="13" height="22" rx="6.5" fill="#f97316"/>
  <!-- Mão direita -->
  <circle cx="76.5" cy="104" r="7" fill="#ea580c"/>

  <!-- Badge "S" na barriga -->
  <circle cx="70" cy="100" r="8" fill="white" stroke="#f97316" stroke-width="2"/>
  <text x="70" y="104" text-anchor="middle" font-size="9" font-weight="900"
        fill="#f97316" font-family="serif">S</text>
</svg>
